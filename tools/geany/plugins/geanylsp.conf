[geanylsp]
enabled=true
log_level=info
log_file=.dots/logs/geanylsp.log
request_timeout_ms=2500
retry_count=1

[language:DOTS]
filetypes=dotS;vit
command=dots lsp --stdio
root_patterns=.git,dots.json,vit.mod
initialization_options={"diagnostics":{"severity":{"info":"info","warn":"warn","error":"error"}}}

[fallback]
goto_definition_cmd=bash scripts/geany_goto_definition.sh "%w"
