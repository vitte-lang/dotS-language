# Geany filetype config for DotS
# Install to: ~/.config/geany/filedefs/filetypes.DOTS.conf

[styling=C]
lexer_filetype=CPP
comment_single=#

[keywords]
primary=space pull form proc const let give loop if else continue break entry at
secondary=true false null
tertiary=assert parse snapshot benchmark warmup summary

[settings]
extension=dotS
mime_type=text/plain
wordchars=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_./-
comment_use_indent=true
comment_open=#
comment_close=
context_action_cmd=bash scripts/geany_goto_definition.sh "%s"
autocomplete_all=true
symbol_list_sort_mode=0
tag_parser=Regexp
brace_match_ltgt=false

[indentation]
width=4
type=1
hard_tabs=0
detect_indent=true
detect_indent_width=true

[build-settings]
compiler_regex=^(?:dots:\s*)?([^:\n]+):([0-9]+)(?::([0-9]+))?:?\s*(.*)$

[build-menu]
EX_00_LB=Lint
EX_00_CM=dots lint --format json "%f"
EX_00_WD=%p

EX_01_LB=Fmt
EX_01_CM=dots fmt --write "%f"
EX_01_WD=%p

EX_02_LB=Run
EX_02_CM=dots run "%f"
EX_02_WD=%p

EX_03_LB=Check
EX_03_CM=dots check "%f"
EX_03_WD=%p

EX_04_LB=Run selection via eval
EX_04_CM=dots eval --expr "%s"
EX_04_WD=%p

EX_05_LB=Open benchmark dashboard local
EX_05_CM=bash scripts/bench.sh dashboard
EX_05_WD=%p

EX_06_LB=Generate completions
EX_06_CM=bash scripts/gen_completion_from_registry.sh
EX_06_WD=%p

EX_07_LB=Completion gate
EX_07_CM=bash scripts/ci_completion_up_to_date.sh
EX_07_WD=%p

EX_08_LB=Run parser tests generation
EX_08_CM=bash scripts/gen_parser_each_command_test.sh
EX_08_WD=%p

EX_09_LB=Run completion gates
EX_09_CM=bash -lc 'bash scripts/ci_completion_up_to_date.sh && bash scripts/ci_completion_no_network_gate.sh'
EX_09_WD=%p

EX_10_LB=Run real protocol gate
EX_10_CM=bash scripts/ci_real_protocol_gate.sh
EX_10_WD=%p

EX_11_LB=Run CLI startup bench budget
EX_11_CM=bash scripts/cli_startup_bench.sh 20 120
EX_11_WD=%p

EX_12_LB=Run fake registry e2e subset
EX_12_CM=bash -lc 'dots test --filter e2e_fake_registry'
EX_12_WD=%p

EX_13_LB=Bench quick
EX_13_CM=DOTS_BENCH_MODE=quick bash scripts/bench.sh run-all
EX_13_WD=%p

EX_14_LB=Bench stress
EX_14_CM=DOTS_BENCH_MODE=stress bash scripts/bench.sh run-all
EX_14_WD=%p

EX_15_LB=CLI healthcheck
EX_15_CM=bash scripts/cli_healthcheck.sh
EX_15_WD=%p

EX_16_LB=Regenerate snapshots completion
EX_16_CM=bash -lc 'cp completions/dots.bash tests/snapshots/completions/dots.bash.snapshot && cp completions/_dots tests/snapshots/completions/dots.zsh.snapshot && cp completions/dots.fish tests/snapshots/completions/dots.fish.snapshot && cp completions/registry.json tests/snapshots/completions/registry.snapshot.json'
EX_16_WD=%p

[tools]
terminal_cmd=env DOTS_CLI_STRICT=1 DOTS_REGISTRY_MODE=fake bash -lc

[tagmanager]
extension=dotS
tm_parsers=Regex
regex_proc=^\s*proc\s+([A-Za-z0-9_]+)
regex_form=^\s*form\s+([A-Za-z0-9_]+)
regex_entry=^\s*entry\s+at\s+([A-Za-z0-9_\/-]+)

[folding]
enable=true
start_regex=^\s*(proc|form|entry)\b.*\{\s*$
end_regex=^\s*}\s*$

[styles]
# Non-greedy call-like pattern styling hint for .foo.bar.
call_pattern=\.[A-Za-z_][A-Za-z0-9_]*(\.[A-Za-z_][A-Za-z0-9_]*)*\.
