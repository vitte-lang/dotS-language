# Source of truth: editor/geany/filedefs/filetypes.VIT.conf

[styling=C]
lexer_filetype=CPP
comment_single=#

[keywords]
primary=space pull form proc const let give loop if else continue break entry at
secondary=true false null
tertiary=RuntimeResult RuntimeError CancelToken schema_version run_id request_id TH_NEW TH_RUNNING TH_JOINED AS_NEW AS_RUNNING AS_DONE

[settings]
extension=vit
mime_type=text/plain
wordchars=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_./-
comment_open=#
comment_close=
tag_parser=Regexp
context_action_cmd=bash scripts/geany_goto_definition.sh "%s"

[indentation]
width=4
type=1
hard_tabs=0
detect_indent=true
detect_indent_width=true

[build-settings]
compiler_regex=^(?:dots:\s*)?([^:\n]+):([0-9]+)(?::([0-9]+))?:?\s*(.*)$

[build-menu]
EX_00_LB=Fmt
EX_00_CM=dots fmt --write "%f"
EX_00_WD=%p
EX_01_LB=Lint
EX_01_CM=dots lint --format json "%f"
EX_01_WD=%p
EX_02_LB=Runtime status JSON
EX_02_CM=dots runtime status --json
EX_02_WD=%p
EX_03_LB=Runtime doctor strict
EX_03_CM=dots runtime doctor --strict
EX_03_WD=%p

[tagmanager]
extension=vit
tm_parsers=Regex
regex_proc=^\s*proc\s+([A-Za-z0-9_]+)
regex_form=^\s*form\s+([A-Za-z0-9_]+)
regex_const=^\s*const\s+([A-Za-z0-9_]+)
regex_state=^\s*const\s+(TH_[A-Z0-9_]+|AS_[A-Z0-9_]+):

[styles]
state_enum_pattern=\b(TH_[A-Z0-9_]+|AS_[A-Z0-9_]+)\b
error_code_pattern=\b(E_[A-Z0-9_]+)\b
id_fields_pattern=\b(schema_version|run_id|request_id)\b
danger_exec_pattern=process\.exec\("bash"\)
