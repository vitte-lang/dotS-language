# Source of truth: editor/geany/filedefs/filetypes.DOTS.conf

[styling=C]
lexer_filetype=CPP
comment_single=#

[keywords]
primary=space pull form proc const let give loop if else continue break entry at
secondary=true false null
tertiary=TH_NEW TH_RUNNING TH_JOINED TH_DETACHED TH_CANCELLED AS_NEW AS_RUNNING AS_DONE AS_CANCELLED E_RUNTIME_TIMEOUT E_DEADLOCK E_OOM E_PANIC E_CANCELLED schema_version run_id request_id

[settings]
extension=dotS
mime_type=text/plain
wordchars=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789_./-
comment_use_indent=true
comment_open=#
comment_close=
context_action_cmd=bash scripts/geany_goto_definition.sh "%s"
autocomplete_all=true
symbol_list_sort_mode=0
tag_parser=Regexp
brace_match_ltgt=false

[indentation]
width=4
type=1
hard_tabs=0
detect_indent=true
detect_indent_width=true

[build-settings]
compiler_regex=^(?:dots:\s*)?([^:\n]+):([0-9]+)(?::([0-9]+))?:?\s*(.*)$

[build-menu]
EX_00_LB=Lint
EX_00_CM=dots lint --format json "%f"
EX_00_WD=%p

EX_01_LB=Fmt
EX_01_CM=dots fmt --write "%f"
EX_01_WD=%p

EX_02_LB=Run
EX_02_CM=dots run "%f"
EX_02_WD=%p

EX_03_LB=Check
EX_03_CM=dots check "%f"
EX_03_WD=%p

EX_04_LB=Run selection via eval
EX_04_CM=dots eval --expr "%s"
EX_04_WD=%p

EX_05_LB=Open benchmark dashboard local
EX_05_CM=bash scripts/bench.sh dashboard
EX_05_WD=%p

EX_06_LB=Generate completions
EX_06_CM=bash scripts/gen_completion_from_registry.sh
EX_06_WD=%p

EX_07_LB=Completion gate
EX_07_CM=bash scripts/ci_completion_up_to_date.sh
EX_07_WD=%p

EX_08_LB=Run parser tests generation
EX_08_CM=bash scripts/gen_parser_each_command_test.sh
EX_08_WD=%p

EX_09_LB=Run completion gates
EX_09_CM=bash -lc 'bash scripts/ci_completion_up_to_date.sh && bash scripts/ci_completion_no_network_gate.sh'
EX_09_WD=%p

EX_10_LB=Run real protocol gate
EX_10_CM=bash scripts/ci_real_protocol_gate.sh
EX_10_WD=%p

EX_11_LB=Run CLI startup bench budget
EX_11_CM=bash scripts/cli_startup_bench.sh 20 120
EX_11_WD=%p

EX_12_LB=Run no-shell gates
EX_12_CM=bash -lc 'bash scripts/ci_no_shell_network_gate.sh && bash scripts/ci_runtime_no_shell_gate.sh'
EX_12_WD=%p

EX_13_LB=Run runtime contract gates
EX_13_CM=bash -lc 'bash scripts/ci_runtime_status_contract_gate.sh && bash scripts/ci_runtime_doctor_contract_gate.sh'
EX_13_WD=%p

EX_14_LB=Run runtime perf budget gate
EX_14_CM=bash scripts/ci_runtime_perf_budget.sh
EX_14_WD=%p

EX_15_LB=Open runtime dashboard
EX_15_CM=bash scripts/runtime_dashboard.sh
EX_15_WD=%p

EX_16_LB=Runtime status JSON
EX_16_CM=dots runtime status --json
EX_16_WD=%p

EX_17_LB=Runtime status Prom
EX_17_CM=dots runtime status --prom
EX_17_WD=%p

EX_18_LB=Runtime doctor strict
EX_18_CM=dots runtime doctor --strict
EX_18_WD=%p

EX_19_LB=Runtime events tail
EX_19_CM=dots runtime events --lines 100
EX_19_WD=%p

EX_20_LB=Runtime trace
EX_20_CM=dots runtime trace
EX_20_WD=%p

EX_21_LB=Run changed tests/runtime
EX_21_CM=bash -lc 'git diff --name-only -- tests/runtime | sed -n "s#^tests/runtime/##p" | sed -n "s#\.vit$##p" | head -n 1 | xargs -r -I{} dots test --filter {}'
EX_21_WD=%p

EX_22_LB=Generate runtime snapshots
EX_22_CM=bash -lc 'mkdir -p tests/snapshots/runtime && dots runtime status --json > tests/snapshots/runtime/status.json && dots runtime status --prom > tests/snapshots/runtime/status.prom && dots runtime status --table > tests/snapshots/runtime/status.table.txt'
EX_22_WD=%p

EX_23_LB=Bench runtime quick
EX_23_CM=DOTS_BENCH_MODE=quick bash scripts/bench.sh run runtime_thread_spawn
EX_23_WD=%p

EX_24_LB=Bench runtime nightly (manual)
EX_24_CM=DOTS_BENCH_MODE=nightly bash scripts/bench.sh run-all
EX_24_WD=%p

EX_25_LB=CI dry-run local subset
EX_25_CM=bash -lc 'bash scripts/lint_vit.sh && bash scripts/fmt_vit_check.sh && bash scripts/ci_cli_gate.sh'
EX_25_WD=%p

EX_26_LB=Regenerate parser/completion/help snapshots
EX_26_CM=bash -lc 'bash scripts/gen_parser_each_command_test.sh && bash scripts/gen_completion_from_registry.sh && bash scripts/gen_help_snapshots.sh'
EX_26_WD=%p

EX_27_LB=EOL guard snapshots
EX_27_CM=bash scripts/ci_snapshot_eol_windows_gate.sh
EX_27_WD=%p

EX_28_LB=Toggle strict ON
EX_28_CM=bash -lc 'export DOTS_RUNTIME_STRICT=1 DOTS_CLI_STRICT=1; echo strict=on'
EX_28_WD=%p

EX_29_LB=Toggle strict OFF
EX_29_CM=bash -lc 'unset DOTS_RUNTIME_STRICT DOTS_CLI_STRICT; echo strict=off'
EX_29_WD=%p

EX_30_LB=Toggle registry fake
EX_30_CM=bash -lc 'export DOTS_REGISTRY_MODE=fake; echo registry=fake'
EX_30_WD=%p

EX_31_LB=Toggle registry real
EX_31_CM=bash -lc 'export DOTS_REGISTRY_MODE=real; echo registry=real'
EX_31_WD=%p

[tools]
terminal_cmd=env DOTS_CLI_STRICT=1 DOTS_RUNTIME_SEED=424242 DOTS_REGISTRY_MODE=fake bash -lc

[tagmanager]
extension=dotS
tm_parsers=Regex
regex_proc=^\s*proc\s+([A-Za-z0-9_]+)
regex_form=^\s*form\s+([A-Za-z0-9_]+)
regex_entry=^\s*entry\s+at\s+([A-Za-z0-9_\/-]+)
regex_const=^\s*const\s+([A-Za-z0-9_]+)
regex_state=^\s*const\s+(TH_[A-Z0-9_]+|AS_[A-Z0-9_]+):

[folding]
enable=true
start_regex=^\s*(proc|form|entry)\b.*\{\s*$
end_regex=^\s*}\s*$

[styles]
call_pattern=\.[A-Za-z_][A-Za-z0-9_]*(\.[A-Za-z_][A-Za-z0-9_]*)*\.
state_enum_pattern=\b(TH_[A-Z0-9_]+|AS_[A-Z0-9_]+)\b
error_code_pattern=\b(E_[A-Z0-9_]+)\b
id_fields_pattern=\b(schema_version|run_id|request_id)\b
danger_exec_pattern=process\.exec\("bash"\)
