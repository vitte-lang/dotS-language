name: CLI Orchestrator

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: cli-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      core: ${{ steps.filter.outputs.core }}
      runtime: ${{ steps.filter.outputs.runtime }}
      lsp: ${{ steps.filter.outputs.lsp }}
      ffi: ${{ steps.filter.outputs.ffi }}
      geany: ${{ steps.filter.outputs.geany }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'cmd/**'
              - 'core/**'
              - 'scripts/**'
              - '.github/workflows/**'
              - 'tests/cli/**'
              - 'completions/**'
            runtime:
              - 'runtime/**'
              - 'tests/runtime/**'
              - 'bench/runtime_*'
              - 'scripts/ci_runtime_*'
            lsp:
              - 'lsp/**'
              - 'tests/lsp/**'
              - 'scripts/ci_lsp_*'
            ffi:
              - 'ffi/**'
              - 'tests/ffi/**'
            geany:
              - 'editor/geany/**'
              - 'scripts/ci_geany_assets_gate.sh'
              - 'scripts/geany_*'
              - 'scripts/install_geany_*'
              - 'scripts/uninstall_geany_*'
              - 'tests/cli/geany_assets.test.vit'
              - 'tests/snapshots/geany/**'
            docs_only:
              - 'docs/**'
              - 'README.md'

  cli-core:
    if: needs.changes.outputs.docs_only != 'true' || github.event_name == 'workflow_dispatch'
    needs: [changes]
    uses: ./.github/workflows/cli-core.yml

  lsp-gates:
    if: needs.changes.outputs.lsp == 'true' || github.event_name == 'workflow_dispatch'
    needs: [changes]
    uses: ./.github/workflows/lsp.yml

  ffi-gates:
    if: needs.changes.outputs.ffi == 'true' || github.event_name == 'workflow_dispatch'
    needs: [changes]
    uses: ./.github/workflows/ffi.yml

  runtime-gates:
    if: needs.changes.outputs.runtime == 'true' || github.event_name == 'workflow_dispatch'
    needs: [changes]
    uses: ./.github/workflows/runtime.yml

  geany-assets-gates:
    if: needs.changes.outputs.geany == 'true' || github.event_name == 'workflow_dispatch'
    needs: [changes]
    uses: ./.github/workflows/geany.yml

  release-artifacts:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build release
        run: echo "Build CLI artifacts"
      - name: Sign artifacts
        run: echo "Sign binaries placeholder"
      - name: SLSA provenance verify dry-run
        run: echo "Generate provenance placeholder"
      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-${{ github.run_id }}
          path: |
            docs/man
            completions
          if-no-files-found: warn
          retention-days: 14
