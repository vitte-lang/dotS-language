name: LSP Gates (reusable)

on:
  workflow_call:

concurrency:
  group: lsp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lsp-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: LSP gates
        run: |
          bash scripts/ci_lsp_stdout_gate.sh
          bash scripts/ci_lsp_latency_gate.sh
          bash scripts/ci_lsp_schema_gate.sh
          bash scripts/ci_lsp_ttfo_gate.sh
      - name: Upload LSP snapshots
        uses: actions/upload-artifact@v4
        with:
          name: lsp-${{ github.run_id }}
          path: tests/snapshots/lsp
          if-no-files-found: warn
          retention-days: 14
