name: Snapshots Auto Update (optional)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: snapshots-bot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate snapshots
        run: |
          bash scripts/gen_help_snapshots.sh
          bash scripts/gen_completion_from_registry.sh
          bash scripts/gen_parser_each_command_test.sh
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(ci): auto-update generated snapshots"
          title: "chore(ci): auto-update generated snapshots"
          body: "Automated snapshot/completion/parser regeneration after merge."
          branch: chore/auto-snapshots-${{ github.run_id }}
          delete-branch: true
          labels: ci,automated
